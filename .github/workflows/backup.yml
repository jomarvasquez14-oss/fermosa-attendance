name: Database backup

# Twice-daily automated snapshot of the production database to the private
# Supabase Storage "backups" bucket, plus an off-Supabase copy kept as a
# workflow artifact. Also runnable on demand (the "Run workflow" button) — use
# that before every payroll cutoff for a fresh snapshot.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
# The workflow errors harmlessly until those are set. See docs/BACKUP-RESTORE.md.

on:
  schedule:
    - cron: '0 4 * * *' # 12:00 noon Asia/Manila (UTC+8)  -> the "noon" snapshot
    - cron: '0 15 * * *' # 11:00 PM Asia/Manila (UTC+8)    -> the "night" snapshot
  workflow_dispatch:
    inputs:
      label:
        description: 'Business label / folder (default: fermosa)'
        required: false
        default: 'fermosa'

permissions:
  contents: read

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+ has native global WebSocket, which @supabase/supabase-js's
          # realtime client requires at import (Node 20 throws on createClient).
          node-version: '22'

      - name: Install backup dependency
        run: npm i @supabase/supabase-js@2 --no-save

      - name: Run backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKUP_LABEL: ${{ github.event.inputs.label || 'fermosa' }}
          # Scheduled runs are "daily"; manual runs are timestamped so a
          # pre-payroll backup never clobbers a scheduled one.
          BACKUP_KIND: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'daily' }}
          # Which of the two daily snapshots this is (kept as separate files so
          # both recovery points survive). Ignored for manual runs.
          BACKUP_SLOT: ${{ github.event.schedule == '0 15 * * *' && 'night' || 'noon' }}
          BACKUP_OUT_DIR: backup-out
        run: node scripts/backup/backup.mjs

      - name: Keep an off-Supabase copy (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup-out/
          retention-days: 90
          if-no-files-found: error
